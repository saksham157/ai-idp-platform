apiVersion: apps/v1
kind: Deployment

metadata:
  name: ai-idp-platform
  namespace: platform-system

spec:
  replicas: 2

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: ai-idp-platform

  template:
    metadata:
      labels:
        app: ai-idp-platform

    spec:
      containers:

        - name: ai-idp-platform

          image: saksham8000/ai-idp-platform:71

          imagePullPolicy: Always

          ports:
            - containerPort: 8000

          env:
            - name: DATABASE_URL
              value: "postgresql://platform:platform123@postgres-service.platform-system.svc.cluster.local:5432/platformdb"

          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"
